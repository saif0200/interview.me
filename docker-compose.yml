services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interviewme
      POSTGRES_USER: interviewme
      POSTGRES_PASSWORD: interviewme
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewme"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgresql://interviewme:interviewme@postgres:5432/interviewme?sslmode=disable
      DO_MODEL_ACCESS_KEY: ${DO_MODEL_ACCESS_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      PORT: "3001"
      LOG_LLM_PAYLOADS: ${LOG_LLM_PAYLOADS:-}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
  logs:
