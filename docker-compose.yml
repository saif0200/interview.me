services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: interviewme
      POSTGRES_USER: interviewme
      POSTGRES_PASSWORD: interviewme
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewme"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    init: true
    expose:
      - "3001"
    environment:
      DATABASE_URL: postgresql://interviewme:interviewme@postgres:5432/interviewme?sslmode=disable
      DO_MODEL_ACCESS_KEY: ${DO_MODEL_ACCESS_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      PORT: "3001"
      LOG_LLM_PAYLOADS: ${LOG_LLM_PAYLOADS:-}
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - logs:/app/logs
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  logs:
